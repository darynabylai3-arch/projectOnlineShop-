<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🛍️ ShopMind</div>
    <h2>Создать аккаунт</h2>
    <p class="auth-subtitle">Зарегистрируйтесь бесплатно</p>

    <div class="form-group">
      <label>Логин</label>
      <input [(ngModel)]="username" type="text" placeholder="Придумайте логин" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="Введите email" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input [(ngModel)]="password" type="password" placeholder="Придумайте пароль" />
    </div>

    @if (error) {
    <p class="error-msg">{{ error }}</p>
    }

    <button class="btn-submit" (click)="submit()">Зарегистрироваться</button>

    <p class="auth-link">Уже есть аккаунт? <a routerLink="/login">Войти</a></p>
  </div>
</div>
