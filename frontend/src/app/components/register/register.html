<div class="auth-wrapper">
  <div class="auth-card">
    <aside class="auth-sidebar">
      <div class="sidebar-blob1"></div>
      <div class="sidebar-blob2"></div>

      <div class="sidebar-top">
        <div class="auth-logo">🛍️ ShopMind</div>
      </div>

      <div class="sidebar-mid">
        <div class="sidebar-quote">
          <strong>Join the community.</strong>
          Create an account and start your shopping journey with us.
        </div>
      </div>

      <div class="sidebar-steps">
        <div class="step">
          <div class="step-dot"></div>
          <div class="step-label">Sign in to your account</div>
        </div>
        <div class="step active">
          <div class="step-dot"></div>
          <div class="step-label">Create new account</div>
        </div>
        <div class="step">
          <div class="step-dot"></div>
          <div class="step-label">Reset password</div>
        </div>
      </div>
    </aside>

    <div class="auth-body">
      <div class="auth-top-row">
        <p class="auth-eyebrow">Get started</p>
        <div class="step-indicator">
          <span class="si"></span>
          <span class="si active"></span>
          <span class="si"></span>
        </div>
      </div>

      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join ShopMind for free</p>

      <div class="form-group">
        <label>Username</label>
        <input [(ngModel)]="username" type="text" placeholder="Choose a username" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="email" type="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <div class="form-label-row">
          <label>Password</label>
          <a class="forgot-link" href="javascript:void(0)">?</a>
        </div>
        <input [(ngModel)]="password" type="password" placeholder="Create a password" />
      </div>

      @if (error) {
        <p class="error-msg">{{ error }}</p>
      }

      <button class="btn-submit" (click)="submit()">
        Sign Up
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <div class="auth-divider">
        <hr /><span>OR</span><hr />
      </div>

      <div class="social-row">
        <button class="social-btn">Google</button>
        <button class="social-btn">GitHub</button>
      </div>

      <p class="auth-link">
        Already have an account? <a routerLink="/login">Sign In</a>
      </p>
    </div>
  </div>
</div>
