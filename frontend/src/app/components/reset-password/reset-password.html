<div class="auth-wrapper">
    <div class="auth-card">
      <aside class="auth-sidebar">
        <div class="sidebar-blob1"></div>
        <div class="sidebar-blob2"></div>
  
        <div class="sidebar-top">
          <div class="auth-logo">🛍️ ShopMind</div>
        </div>
  
        <div class="sidebar-mid">
          <div class="sidebar-quote">
            <strong>Create new password</strong>
            Choose a strong password to keep your account secure.
          </div>
        </div>
  
        <div class="sidebar-steps">
          <div class="step">
            <div class="step-dot"></div>
            <div class="step-label">Sign in to your account</div>
          </div>
          <div class="step">
            <div class="step-dot"></div>
            <div class="step-label">Create new account</div>
          </div>
          <div class="step active">
            <div class="step-dot"></div>
            <div class="step-label">Reset password</div>
          </div>
        </div>
      </aside>
  
      <div class="auth-body">
        <div class="auth-top-row">
          <p class="auth-eyebrow">Reset password</p>
          <div class="step-indicator">
            <span class="si"></span>
            <span class="si"></span>
            <span class="si active"></span>
          </div>
        </div>
  
        <h2 class="auth-title">New Password</h2>
        <p class="auth-subtitle">Enter your new password below</p>
  
        <div class="form-group">
          <label>New Password</label>
          <input [(ngModel)]="newPassword" type="password" placeholder="••••••••" />
        </div>
  
        <div class="form-group">
          <label>Confirm Password</label>
          <input [(ngModel)]="confirmPassword" type="password" placeholder="••••••••" />
        </div>
  
        @if (error) {
          <p class="error-msg">{{ error }}</p>
        }
        
        @if (success) {
          <p class="success-msg">{{ success }}</p>
        }
  
        <button class="btn-submit" (click)="submit()" [disabled]="loading">
          @if (loading) {
            <span>Resetting...</span>
          } @else {
            <span>Reset Password</span>
          }
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
  
        <p class="auth-link">
          <a routerLink="/login">Back to Sign In</a>
        </p>
      </div>
    </div>
  </div>
