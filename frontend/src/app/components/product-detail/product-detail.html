<div class="detail-wrapper">

  <header class="detail-hero">
    <div class="hero-blob1"></div>
    <div class="hero-blob2"></div>
    <div class="hero-inner">
      <div>
        <div class="hero-logo">🛍️ Shop<span>Mind</span></div>
        <div class="hero-tagline">Smart shopping experience</div>
      </div>
      <a routerLink="/" class="btn-back">← Back</a>
    </div>
  </header>

  <main class="detail-main">
    @if (product) {
      <div class="detail-card">

        <img *ngIf="product.image; else noImg" [src]="product.image" class="detail-img" />
        <ng-template #noImg>
          <div class="detail-no-image">No image</div>
        </ng-template>

        <div class="detail-info">
          <h1>{{ product.name }}</h1>
          <div class="detail-divider"></div>
          <p class="detail-desc">{{ product.description }}</p>
          <div class="detail-price">{{ product.price }} ₸</div>
          <div class="detail-stock">
            <span class="stock-dot"></span>
            In stock: {{ product.stock }} pcs.
          </div>
          <div class="detail-actions">
            <button class="btn-cart" (click)="addToCart()">🛒 Add to cart</button>
          </div>
        </div>

      </div>
    } @else {
      <p class="loading">Loading...</p>
    }
  </main>

</div>
