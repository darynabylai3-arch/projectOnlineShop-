<div class="shop">
  <header class="hero">
    <h1>ShopMind</h1>
    <p>Ваш умный интернет-магазин</p>
    <a routerLink="/login" class="btn-primary">Войти</a>
    <a routerLink="/register" class="btn-secondary">Регистрация</a>
  </header>

  <main class="products-section">
    <h2>Каталог товаров</h2>

    <div class="products-grid" *ngIf="products.length > 0">
      <div class="product-card" *ngFor="let p of products">
        <img [src]="'http://localhost:8000' + p.image" *ngIf="p.image" alt="{{ p.name }}"/>
        <div class="no-image" *ngIf="!p.image"></div>
        <div class="card-body">
          <h3>{{ p.name }}</h3>
          <p class="desc">{{ p.description }}</p>
          <div class="card-footer">
            <span class="price">{{ p.price }} ₸</span>
            <a [routerLink]="['/product', p.id]" class="btn-buy">Подробнее</a>
          </div>
        </div>
      </div>
    </div>

    <div class="empty" *ngIf="products.length === 0">
      <p>Товаров пока нет. Добавьте их через <a routerLink="/admin">админ панель</a>.</p>
    </div>
  </main>
</div>
