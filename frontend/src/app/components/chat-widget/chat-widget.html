<div class="cw-wrap">

  <button class="cw-btn" (click)="toggle()" [class.open]="isOpen">
    <span *ngIf="!isOpen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px">
        <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 2.98.97 4.29L2 22l5.71-.97C9.02 21.64 10.46 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/>
        <circle cx="8" cy="12" r="1.2" fill="white"/>
        <circle cx="12" cy="12" r="1.2" fill="white"/>
        <circle cx="16" cy="12" r="1.2" fill="white"/>
      </svg>
      ИИ Консультант
    </span>
    <span *ngIf="isOpen">✕</span>
    <span class="cw-dot" *ngIf="hasNew && !isOpen"></span>
  </button>

  <div class="cw-window" [class.visible]="isOpen">

    <div class="cw-header-stripe"></div>

    <div class="cw-header">
      <div class="cw-avatar">🤖</div>
      <div>
        <div class="cw-name">ShopMind AI</div>
        <div class="cw-status">
          <span class="cw-online"></span> Онлайн — готов помочь
        </div>
      </div>
    </div>

    <div class="cw-messages" #messagesBox>
      <div *ngFor="let m of messages"
           class="cw-row"
           [class.cw-user]="m.role === 'user'"
           [class.cw-ai]="m.role === 'assistant'">
        <span class="cw-ava" *ngIf="m.role === 'assistant'">🤖</span>
        <div class="cw-bubble"
             [class.user]="m.role === 'user'"
             [class.ai]="m.role === 'assistant'">
          {{ m.content }}
          <span class="cw-time">{{ m.time }}</span>
        </div>
      </div>

      <div class="cw-row cw-ai" *ngIf="isLoading">
        <span class="cw-ava">🤖</span>
        <div class="cw-bubble ai cw-typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="cw-input">
      <textarea #inputRef [(ngModel)]="text" (keydown)="onKey($event)"
        placeholder="Написать сообщение..." rows="1" [disabled]="isLoading"></textarea>
      <button (click)="send()" [disabled]="!text.trim() || isLoading">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>
</div>
