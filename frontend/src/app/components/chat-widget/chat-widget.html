<div class="cw-wrap">

  <button class="cw-btn" (click)="toggle()" [class.open]="isOpen">
    <ng-container *ngIf="!isOpen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 2.98.97 4.29L2 22l5.71-.97C9.02 21.64 10.46 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/>
        <circle cx="8" cy="12" r="1.2" fill="white"/>
        <circle cx="12" cy="12" r="1.2" fill="white"/>
        <circle cx="16" cy="12" r="1.2" fill="white"/>
      </svg>
      AI Assistant
    </ng-container>
    <ng-container *ngIf="isOpen">✕</ng-container>
    <span class="cw-dot" *ngIf="hasNew && !isOpen"></span>
  </button>

  <div class="cw-window" [class.visible]="isOpen">

    <div class="cw-header">
      <div class="cw-header-blob"></div>
      <div class="cw-header-inner">
        <div class="cw-avatar">🤖</div>
        <div>
          <div class="cw-name">ShopMind AI</div>
          <div class="cw-status">
            <span class="cw-online"></span> Online 24/7 — ready to help!
          </div>
        </div>
        <button
          class="cw-clear"
          style="margin-left:auto"
          (click)="clearChat()"
          title="Clear chat">
          Clear
        </button>
      </div>
    </div>

    <div class="cw-suggestions" *ngIf="messages.length <= 1">
      <button class="cw-chip" *ngFor="let s of suggestions" (click)="sendSuggestion(s)">
        {{ s }}
      </button>
    </div>

    <div class="cw-messages" #messagesBox>

      <div *ngFor="let m of messages; let i = index"
           class="cw-row"
           [class.cw-user]="m.role === 'user'"
           [class.cw-ai]="m.role === 'assistant'">

        <div class="cw-ava-sm" *ngIf="m.role === 'assistant'">🤖</div>

        <div>
          <div class="cw-bubble"
               [class.user]="m.role === 'user'"
               [class.ai]="m.role === 'assistant'">
            {{ m.content }}
            <span class="cw-time">{{ m.time }}</span>
          </div>

          <div class="cw-reactions" *ngIf="m.role === 'assistant'">
            <button
              class="cw-react-btn"
              *ngFor="let r of reactionEmojis"
              [class.reacted]="m.reaction === r"
              (click)="react(m, r)">
              {{ r }}
            </button>
          </div>
        </div>

      </div>

      <div class="cw-typing-row" *ngIf="isLoading">
        <div class="cw-ava-sm">🤖</div>
        <div class="cw-typing">
          <span></span><span></span><span></span>
        </div>
      </div>

    </div>

    <div class="cw-input">
      <textarea
        #inputRef
        [(ngModel)]="text"
        (keydown)="onKey($event)"
        (input)="autoResize($event)"
        placeholder="Type a message..."
        rows="1"
        [disabled]="isLoading">
      </textarea>
      <button class="cw-send" (click)="send()" [disabled]="!text.trim() || isLoading">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>
</div>
